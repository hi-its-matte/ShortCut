<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MatteDev ShortCut</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            
            <h1>Login</h1>
            <p>Accedi Con MatteDev Account.</p>

            <form id="auth-form" class="form-grid">
                <label class="field">
                    <span>Email</span>
                    <input type="email" id="email" name="email" placeholder="nome@email.com" required>
                </label>

                <label class="field">
                    <span>Password</span>
                    <input type="password" id="password" name="password"  minlength="6" required>
                </label>

                <div class="form-actions">
                    <button type="submit" id="login-btn" class="btn-primary">Login</button>
                </div>
            </form>

            <p class="helper-text">
                <a href="https://account.mattedev.com/pages/login.html#registrazione" id="register-btn">Non hai un account? Registrati</a>
            </p>
            <p id="auth-message" class="helper-text" aria-live="polite"></p>
        </section>
    </main>

    <script type="module" src="../js/auth.js"></script>
</body>
</html>
